name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run dist:appimage
      - name: Create checksum
        working-directory: dist
        run: sha256sum *.AppImage > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.AppImage dist/SHA256SUMS --title "VibeShot $GITHUB_REF_NAME" --generate-notes

  windows:
    needs: appimage
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run dist:windows
      - name: Create checksum
        shell: pwsh
        run: |
          Get-ChildItem dist -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content dist/SHA256SUMS-windows.txt
      - name: Add Windows installer to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem dist -Filter *.exe -File)
          if ($installers.Count -ne 1) {
            throw "Expected one Windows installer, found $($installers.Count)."
          }
          gh release upload $env:GITHUB_REF_NAME $($installers[0].FullName) dist/SHA256SUMS-windows.txt

