name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run dist:appimage
      - name: Create checksum
        working-directory: dist
        run: sha256sum *.AppImage > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.AppImage dist/SHA256SUMS --title "VibeShot $GITHUB_REF_NAME" --generate-notes

